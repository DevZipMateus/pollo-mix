<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demonstração de Vitrine — Pollo Mix</title>

  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0D0D0D; }
    a { text-decoration: none; }

    /* ===== HEADER — 80px ===== */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      height: 80px;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(13,13,13,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-logo img { height: 42px; width: auto; display: block; }

    nav { display: flex; align-items: center; gap: 28px; }
    nav a {
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      font-weight: 400;
      transition: color 0.2s;
    }
    nav a:hover { color: #fff; }
    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.45) !important;
      font-size: 13px;
    }
    .nav-back:hover { color: rgba(255,255,255,0.85) !important; }
    .nav-cta {
      background: #CC0000;
      color: #fff !important;
      padding: 8px 20px;
      border-radius: 6px;
      font-weight: 600 !important;
      font-size: 13px !important;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: #E00000; }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: #fff;
      border-radius: 2px;
      transition: all 0.3s;
    }

    #navMenu {
      display: none;
      position: fixed;
      top: 80px; left: 0; right: 0;
      background: rgba(13,13,13,0.98);
      backdrop-filter: blur(20px);
      padding: 12px 24px 24px;
      flex-direction: column;
      z-index: 999;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    #navMenu.open { display: flex; }
    #navMenu a {
      color: rgba(255,255,255,0.78);
      font-size: 16px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: color 0.2s;
    }
    #navMenu a:last-child { border-bottom: none; }
    #navMenu a:hover { color: #fff; }
    #navMenu .mob-cta {
      margin-top: 8px;
      background: #CC0000;
      color: #fff !important;
      text-align: center;
      padding: 14px;
      border-radius: 8px;
      font-weight: 600;
      border-bottom: none !important;
    }

    /* ===== IFRAME WRAPPER ===== */
    .vitrine-wrap {
      position: fixed;
      left: 0; right: 0;
      top: 80px;
      bottom: 63px;
    }
    .vitrine-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ===== BADGE MONTESITE ===== */
    #montesite-footer-badge {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 500;
      height: 63px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      nav { display: none; }
      .hamburger { display: flex; }
      header { height: 60px; padding: 0 20px; }
      #navMenu { top: 60px; }
      .vitrine-wrap { top: 60px; }
    }
    @media (max-width: 480px) {
      header { padding: 0 16px; }
      .header-logo img { height: 34px; }
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <a href="index.html" class="header-logo">
    <img src="images/logo.png" alt="Pollo Mix — Produtos Automotivos">
  </a>
  <nav>
    <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i> Voltar ao site</a>
    <a href="index.html#sobre">Sobre</a>
    <a href="index.html#produtos">Produtos</a>
    <a href="index.html#mercado">Atuação</a>
    <a href="index.html#contato" class="nav-cta">Fale conosco</a>
  </nav>
  <button class="hamburger" id="menuBtn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</header>

<nav id="navMenu">
  <a href="index.html"><i class="fas fa-arrow-left"></i> Voltar ao site</a>
  <a href="index.html#sobre">Sobre</a>
  <a href="index.html#produtos">Produtos</a>
  <a href="index.html#mercado">Atuação</a>
  <a href="index.html#contato">Contato</a>
  <a href="https://wa.me/5511942086190" target="_blank" class="mob-cta">
    <i class="fab fa-whatsapp"></i> Falar no WhatsApp
  </a>
</nav>

<!-- ===== VITRINE IFRAME ===== -->
<div class="vitrine-wrap" id="vitrineWrap">
  <iframe
    src="https://pollomix.egestor.com.br/vitrine/"
    id="vitrineIframe"
    allowfullscreen
    title="Vitrine Pollo Mix">
  </iframe>
</div>

<!-- Rodapé MonteSite -->
<div id="montesite-footer-badge"></div>
<script src="https://vaabpicspdbolvutnscp.supabase.co/functions/v1/get-footer-iframe"></script>

<script>
  // Menu mobile
  var menuBtn = document.getElementById('menuBtn');
  var navMenu = document.getElementById('navMenu');
  menuBtn.addEventListener('click', function() {
    navMenu.classList.toggle('open');
  });

  // Ajuste dinâmico do iframe ao redimensionar
  function ajustarIframe() {
    var headerH = document.querySelector('header').offsetHeight;
    var badgeH  = 63;
    var wrap    = document.getElementById('vitrineWrap');
    wrap.style.top    = headerH + 'px';
    wrap.style.bottom = badgeH + 'px';
  }
  window.addEventListener('resize', ajustarIframe);
  ajustarIframe();
</script>
</body>
</html>
